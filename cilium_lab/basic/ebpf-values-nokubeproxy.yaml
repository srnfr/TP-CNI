kubeProxyReplacement: true
loadBalancer:
  mode: dsr
  #mode: snat
nodePort:
  mode: dsr
##tunnel: disabled
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.0.0.0/8"
##
k8sServiceHost: basic-control-plane # use master node in kind network
k8sServicePort: 6443               # use api server port
  #hostServices:
  #  enabled: false
externalIPs:
  enabled: true
nodePort:
  enabled: true
hostPort:
  enabled: true
image:
  pullPolicy: IfNotPresent
ipam:
  mode: kubernetes
prometheus:
  enabled: true
hubble:
  enabled: true
  # Event buffer capacity (default: 4096)
  # Each event uses approximately 100-200 bytes
  # 4096 events ~= 400KB-800KB per agent
  # 65536 events ~= 6.5MB-13MB per agent
  eventBufferCapacity: "65535"
  metrics:
    enabled:
       - drop
       - tcp
       - flow
       - icmp
       - http
  relay:
    enabled: true
  ui:
    enabled: true
